<!DOCTYPE html>
<html lang='en'>
  <head>
    <meta charset='UTF-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <title>Todo List</title>
    <style>
      :root {
        --accent: #6366f1;
        --accent-strong: #4338ca;
        --danger: #dc2626;
        --muted: #475569;
        --surface: #ffffff;
        --border: #e2e8f0;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        background-color: #0f172a;
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #0f172a 0%, #1f2937 40%, #0f172a 100%);
      }

      #root {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 2rem 1rem 3rem;
      }

      .app-card {
        width: min(960px, 100%);
        background-color: var(--surface);
        border-radius: 28px;
        padding: 2.5rem;
        box-shadow: 0 25px 60px rgba(15, 23, 42, 0.35);
      }

      .app-header h1 {
        margin: 0.4rem 0 0;
        font-size: clamp(2.25rem, 4vw, 2.75rem);
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.2rem;
        font-size: 0.75rem;
        color: var(--muted);
        margin: 0;
      }

      .lead {
        margin: 0.25rem 0 0;
        color: var(--muted);
      }

      .task-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 1.75rem;
        border: 1px solid var(--border);
        padding: 1.5rem;
        border-radius: 18px;
        background: #f8fafc;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .field-label {
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .field-input {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.85rem 1rem;
        font-size: 1rem;
        resize: vertical;
        min-height: 44px;
        font-family: inherit;
        background-color: #fff;
      }

      .field-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25);
        outline: none;
      }

      .field-error {
        margin: 0;
        color: var(--danger);
        font-size: 0.85rem;
      }

      .task-form-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        font-size: 0.95rem;
        font-family: inherit;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .primary {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 15px 35px rgba(99, 102, 241, 0.35);
      }

      .secondary {
        background: #e2e8f0;
        color: #0f172a;
      }

      .danger {
        background: var(--danger);
        color: #fff;
        box-shadow: 0 10px 20px rgba(220, 38, 38, 0.3);
      }

      .task-summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        padding: 1rem 0 1.5rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 1.5rem;
      }

      .summary-label {
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.2rem;
        margin: 0;
        color: var(--muted);
      }

      .summary-value {
        margin: 0.25rem 0 0;
        font-size: 1.75rem;
        font-weight: 700;
      }

      .filter-group {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .filter-group button {
        border-radius: 999px;
        padding: 0.5rem 1rem;
        background: #e2e8f0;
        color: #0f172a;
        box-shadow: inset 0 0 0 1px transparent;
      }

      .filter-group button.active {
        background: var(--accent);
        color: #fff;
        box-shadow: inset 0 0 0 1px rgba(99, 102, 241, 0.4);
      }

      .todo-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .todo-item {
        border-radius: 16px;
        padding: 1rem 1.25rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #f8fafc;
        border: 1px solid var(--border);
        gap: 1rem;
      }

      .todo-item.completed {
        border-color: rgba(34, 197, 94, 0.5);
        background: rgba(34, 197, 94, 0.1);
      }

      .todo-main {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex: 1;
        min-width: 0;
      }

      .todo-main h3 {
        margin: 0;
        font-size: 1.1rem;
      }

      .todo-main p {
        margin: 0.25rem 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .todo-actions {
        display: flex;
        gap: 0.5rem;
      }

      .check-button {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fff;
        font-size: 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .status-pill {
        margin-top: 1.25rem;
        padding: 0.65rem 1rem;
        border-radius: 999px;
        font-size: 0.9rem;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        border: 1px solid transparent;
        width: fit-content;
      }

      .status-pill.success {
        background: rgba(34, 197, 94, 0.1);
        color: #15803d;
        border-color: rgba(34, 197, 94, 0.5);
      }

      .status-pill.error {
        background: rgba(239, 68, 68, 0.08);
        color: #b91c1c;
        border-color: rgba(239, 68, 68, 0.5);
      }

      .status-pill.info {
        background: rgba(59, 130, 246, 0.08);
        color: #1d4ed8;
        border-color: rgba(59, 130, 246, 0.5);
      }

      .loading-hint {
        margin-top: 0.5rem;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .empty-state {
        margin: 0;
        color: var(--muted);
        text-align: center;
        padding: 1rem 0;
      }

      @media (max-width: 640px) {
        .app-card {
          padding: 1.75rem;
        }

        .todo-item {
          flex-direction: column;
          align-items: flex-start;
        }

        .todo-actions {
          width: 100%;
          justify-content: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <div class='app-card'>
      <div id='root'></div>
    </div>
    <script type='module'>
      import React, { useCallback, useEffect, useMemo, useState } from 'https://esm.sh/react@18.2.0';
      import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';

      const API_BASE = window.REACT_APP_API_BASE ?? 'http://localhost:5000/api';
      const FILTERS = ['all', 'active', 'completed'];
      const FILTER_LABELS = {
        all: 'All tasks',
        active: 'Active',
        completed: 'Completed',
      };
      const DEFAULT_FORM = { title: '', description: '' };

      const TaskForm = ({ defaultValues = DEFAULT_FORM, onSave, onCancel, disabled, submitLabel, resetOnSave }) => {
        const [title, setTitle] = useState(defaultValues.title);
        const [description, setDescription] = useState(defaultValues.description);
        const [error, setError] = useState('');

        useEffect(() => {
          setTitle(defaultValues.title);
          setDescription(defaultValues.description);
        }, [defaultValues]);

        const handleSubmit = (event) => {
          event.preventDefault();
          if (!title.trim()) {
            setError('Title is required.');
            return;
          }
          setError('');
          onSave({ title: title.trim(), description: description.trim() });
          if (resetOnSave) {
            setTitle('');
            setDescription('');
          }
        };

        return (
          React.createElement('form', { className: 'task-form', onSubmit: handleSubmit },
            React.createElement('div', { className: 'field-group' },
              React.createElement('label', { className: 'field-label', htmlFor: 'todo-title' }, 'Title'),
              React.createElement('input', {
                id: 'todo-title',
                className: 'field-input',
                placeholder: 'E.g. Prepare sprint report',
                value: title,
                onChange: (event) => setTitle(event.target.value),
                disabled,
              })
            ),
            React.createElement('div', { className: 'field-group' },
              React.createElement('label', { className: 'field-label', htmlFor: 'todo-description' }, 'Description'),
              React.createElement('textarea', {
                id: 'todo-description',
                className: 'field-input',
                placeholder: 'Optional details to stay organized',
                value: description,
                onChange: (event) => setDescription(event.target.value),
                disabled,
                rows: 3,
              })
            ),
            error && React.createElement('p', { className: 'field-error', role: 'alert' }, error),
            React.createElement('div', { className: 'task-form-actions' },
              React.createElement('button', { type: 'submit', className: 'primary', disabled }, submitLabel || 'Save task'),
              onCancel && React.createElement('button', { type: 'button', className: 'secondary', onClick: onCancel, disabled }, 'Cancel')
            )
          )
        );
      };

      const TodoList = ({ tasks, onToggle, onEdit, onDelete }) => {
        if (!tasks.length) {
          return React.createElement('p', { className: 'empty-state' }, 'You don\'t have tasks yet. Use the form above to add your first item.');
        }

        return (
          React.createElement('div', { className: 'todo-list' },
            tasks.map((task) =>
              React.createElement('article', { key: task.id, className: `todo-item ${task.completed ? 'completed' : ''}` },
                React.createElement('div', { className: 'todo-main' },
                  React.createElement('button', {
                    type: 'button',
                    className: 'check-button',
                    'aria-pressed': task.completed,
                    'aria-label': task.completed ? `Mark ${task.title} incomplete` : `Mark ${task.title} complete`,
                    onClick: () => onToggle(task),
                  }, task.completed ? '✓' : '○'),
                  React.createElement('div', null,
                    React.createElement('h3', null, task.title),
                    task.description && React.createElement('p', null, task.description)
                  )
                ),
                React.createElement('div', { className: 'todo-actions' },
                  React.createElement('button', { type: 'button', onClick: () => onEdit(task) }, 'Edit'),
                  React.createElement('button', { type: 'button', className: 'danger', onClick: () => onDelete(task) }, 'Delete')
                )
              )
            )
          )
        );
      };

      const App = () => {
        const [todos, setTodos] = useState([]);
        const [filter, setFilter] = useState('all');
        const [loading, setLoading] = useState(false);
        const [selectedTodo, setSelectedTodo] = useState(null);
        const [status, setStatus] = useState('');
        const [statusVariant, setStatusVariant] = useState('info');

        const filteredTodos = useMemo(() => {
          if (filter === 'active') {
            return todos.filter((item) => !item.completed);
          }
          if (filter === 'completed') {
            return todos.filter((item) => item.completed);
          }
          return todos;
        }, [filter, todos]);

        const showStatus = useCallback((message, variant = 'info') => {
          setStatus(message);
          setStatusVariant(variant);
        }, []);

        const fetchTodos = useCallback(async () => {
          setLoading(true);
          try {
            const response = await fetch(`${API_BASE}/todos`);
            if (!response.ok) {
              showStatus('Unable to load tasks from the backend.', 'error');
              return;
            }
            const payload = await response.json();
            setTodos(payload);
          } catch (error) {
            showStatus('Unable to reach the backend. Please start the server.', 'error');
          } finally {
            setLoading(false);
          }
        }, [showStatus]);

        useEffect(() => {
          void fetchTodos();
        }, [fetchTodos]);

        const createTodo = useCallback(
          async (formPayload) => {
            setLoading(true);
            try {
              const response = await fetch(`${API_BASE}/todos`, {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({
                  title: formPayload.title,
                  description: formPayload.description,
                }),
              });
              if (!response.ok) {
                showStatus('Unable to add the task.', 'error');
                return;
              }
              const created = await response.json();
              setTodos((prev) => [...prev, created]);
              showStatus('Task added successfully.', 'success');
            } catch {
              showStatus('Unable to add the task.', 'error');
            } finally {
              setLoading(false);
            }
          },
          [showStatus]
        );

        const updateTodo = useCallback(
          async (formPayload) => {
            setLoading(true);
            try {
              const response = await fetch(`${API_BASE}/todos/${formPayload.id}`, {
                method: 'PUT',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify(formPayload),
              });
              if (!response.ok) {
                showStatus('Unable to update the task.', 'error');
                return;
              }
              const updated = await response.json();
              setTodos((prev) => prev.map((item) => (item.id === updated.id ? updated : item)));
              showStatus('Task updated successfully.', 'success');
            } catch {
              showStatus('Unable to update the task.', 'error');
            } finally {
              setLoading(false);
            }
          },
          [showStatus]
        );

        const handleFormSave = useCallback(
          async (payload) => {
            if (selectedTodo) {
              await updateTodo({
                id: selectedTodo.id,
                title: payload.title,
                description: payload.description,
              });
              setSelectedTodo(null);
            } else {
              await createTodo(payload);
            }
          },
          [selectedTodo, createTodo, updateTodo]
        );

        const handleToggle = useCallback(
          async (task) => {
            await updateTodo({ id: task.id, completed: !task.completed });
          },
          [updateTodo]
        );

        const handleDelete = useCallback(
          async (task) => {
            setLoading(true);
            try {
              const response = await fetch(`${API_BASE}/todos/${task.id}`, { method: 'DELETE' });
              if (!response.ok) {
                showStatus('Unable to delete the task.', 'error');
                return;
              }
              setTodos((prev) => prev.filter((item) => item.id !== task.id));
              showStatus('Task removed successfully.', 'success');
            } catch {
              showStatus('Unable to delete the task.', 'error');
            } finally {
              setLoading(false);
            }
          },
          [showStatus]
        );

        const activeCount = useMemo(() => todos.filter((item) => !item.completed).length, [todos]);
        const completedCount = todos.length - activeCount;

        return (
          React.createElement('div', { className: 'app-card-content' },
            React.createElement('header', { className: 'app-header' },
              React.createElement('p', { className: 'eyebrow' }, 'React + Flask stack'),
              React.createElement('h1', null, 'Todo List'),
              React.createElement('p', { className: 'lead' }, 'Manage tasks with an expressive React UI and a lightweight Python backend.')
            ),
            React.createElement(TaskForm, {
              defaultValues: selectedTodo || DEFAULT_FORM,
              onSave: handleFormSave,
              onCancel: selectedTodo
                ? () => {
                    setSelectedTodo(null);
                    showStatus('Edit canceled.', 'info');
                  }
                : undefined,
              disabled: loading,
              submitLabel: selectedTodo ? 'Save changes' : 'Add task',
              resetOnSave: !selectedTodo,
            }),
            React.createElement('section', { className: 'task-summary' },
              React.createElement('div', null,
                React.createElement('p', { className: 'summary-label' }, 'Active tasks'),
                React.createElement('p', { className: 'summary-value' }, activeCount)
              ),
              React.createElement('div', null,
                React.createElement('p', { className: 'summary-label' }, 'Completed tasks'),
                React.createElement('p', { className: 'summary-value' }, completedCount)
              ),
              React.createElement('div', { className: 'filter-group' },
                FILTERS.map((option) =>
                  React.createElement('button', {
                    key: option,
                    type: 'button',
                    className: option === filter ? 'active' : '',
                    disabled: loading,
                    onClick: () => setFilter(option),
                  }, FILTER_LABELS[option])
                )
              )
            ),
            React.createElement(TodoList, { tasks: filteredTodos, onToggle: handleToggle, onEdit: setSelectedTodo, onDelete: handleDelete }),
            status && React.createElement('div', { className: `status-pill ${statusVariant}`, role: 'status', 'aria-live': 'polite' }, status),
            loading && React.createElement('p', { className: 'loading-hint' }, 'Waiting for the backend...')
          )
        );
      };

      createRoot(document.querySelector('#root')).render(React.createElement(App));
    </script>
  </body>
</html>
