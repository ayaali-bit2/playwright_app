<!DOCTYPE html>
<html lang='en'>
  <head>
    <meta charset='UTF-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <title>Todo List with Authentication</title>
    <style>
      :root {
        --accent: #6366f1;
        --accent-strong: #4338ca;
        --danger: #dc2626;
        --muted: #475569;
        --surface: #ffffff;
        --border: #e2e8f0;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        background-color: #0f172a;
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #0f172a 0%, #1f2937 45%, #0f172a 100%);
      }

      #root {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 2rem 1rem 3rem;
      }

      .app-card {
        width: min(960px, 100%);
        background-color: var(--surface);
        border-radius: 28px;
        padding: 2.5rem;
        box-shadow: 0 25px 60px rgba(15, 23, 42, 0.35);
      }

      .app-card-content {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .app-header h1 {
        margin: 0.4rem 0 0;
        font-size: clamp(2.25rem, 4vw, 2.75rem);
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.2rem;
        font-size: 0.75rem;
        color: var(--muted);
        margin: 0;
      }

      .lead {
        margin: 0.25rem 0 0;
        color: var(--muted);
      }

      .auth-section {
        border: 1px solid var(--border);
        border-radius: 20px;
        background: #f8fafc;
        padding: 1.5rem;
      }

      .auth-panel {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }

      .auth-heading h2 {
        margin: 0.25rem 0 0;
        font-size: 1.6rem;
      }

      .auth-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .auth-note {
        margin: 0 0 1rem;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .auth-form {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }

      .task-wrapper {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .task-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        border: 1px solid var(--border);
        padding: 1.5rem;
        border-radius: 18px;
        background: #ffffff;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .field-label {
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .field-input {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.85rem 1rem;
        font-size: 1rem;
        font-family: inherit;
        background-color: #fff;
      }

      .field-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25);
        outline: none;
      }

      .field-error {
        margin: 0;
        color: var(--danger);
        font-size: 0.85rem;
      }

      .task-form-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        font-size: 0.95rem;
        font-family: inherit;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .primary {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 15px 35px rgba(99, 102, 241, 0.35);
      }

      .secondary {
        background: #e2e8f0;
        color: #0f172a;
      }

      .danger {
        background: var(--danger);
        color: #fff;
        box-shadow: 0 10px 20px rgba(220, 38, 38, 0.3);
      }

      .task-summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        padding: 1rem 0 1.5rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 1.25rem;
      }

      .summary-label {
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.2rem;
        margin: 0;
        color: var(--muted);
      }

      .summary-value {
        margin: 0.35rem 0 0;
        font-size: 1.75rem;
        font-weight: 700;
      }

      .filter-group {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .filter-group button {
        border-radius: 999px;
        padding: 0.5rem 1rem;
        background: #e2e8f0;
        color: #0f172a;
        box-shadow: inset 0 0 0 1px transparent;
      }

      .filter-group button.active {
        background: var(--accent);
        color: #fff;
        box-shadow: inset 0 0 0 1px rgba(99, 102, 241, 0.4);
      }

      .todo-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .todo-item {
        border-radius: 16px;
        padding: 1rem 1.25rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #f8fafc;
        border: 1px solid var(--border);
        gap: 1rem;
      }

      .todo-item.completed {
        border-color: rgba(34, 197, 94, 0.5);
        background: rgba(34, 197, 94, 0.1);
      }

      .todo-main {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex: 1;
        min-width: 0;
      }

      .todo-main h3 {
        margin: 0;
        font-size: 1.1rem;
      }

      .todo-main p {
        margin: 0.25rem 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .todo-actions {
        display: flex;
        gap: 0.5rem;
      }

      .check-button {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fff;
        font-size: 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .status-pill {
        margin-top: 1.25rem;
        padding: 0.65rem 1rem;
        border-radius: 999px;
        font-size: 0.9rem;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        border: 1px solid transparent;
        width: fit-content;
      }

      .status-pill.success {
        background: rgba(34, 197, 94, 0.1);
        color: #15803d;
        border-color: rgba(34, 197, 94, 0.5);
      }

      .status-pill.error {
        background: rgba(239, 68, 68, 0.08);
        color: #b91c1c;
        border-color: rgba(239, 68, 68, 0.5);
      }

      .status-pill.info {
        background: rgba(59, 130, 246, 0.08);
        color: #1d4ed8;
        border-color: rgba(59, 130, 246, 0.5);
      }

      .loading-hint {
        margin-top: 0.5rem;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .empty-state {
        margin: 0;
        color: var(--muted);
        text-align: center;
        padding: 1rem 0;
      }

      @media (max-width: 640px) {
        .app-card {
          padding: 1.75rem;
        }

        .todo-item {
          flex-direction: column;
          align-items: flex-start;
        }

        .todo-actions {
          width: 100%;
          justify-content: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <div class='app-card'>
      <div id='root'></div>
    </div>
    <script type='module'>
      import React, { useCallback, useEffect, useMemo, useState } from 'https://esm.sh/react@18.2.0';
      import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';

      // Determine which backend API to target, defaulting to localhost when the env variable is absent.
      const API_BASE = window.REACT_APP_API_BASE ?? 'http://localhost:5000/api';
      // Available filters for toggling the todo list view.
      const FILTERS = ['all', 'active', 'completed'];
      // Human-friendly labels corresponding to each filter option.
      const FILTER_LABELS = {
        all: 'All tasks',
        active: 'Active',
        completed: 'Completed',
      };
      // Reusable payload that resets the task form fields after saves or cancellations.
      const DEFAULT_FORM = { title: '', description: '' };

      // Parse JSON safely while handling responses that may not include a valid body.
      const parseJson = async (response) => {
        try {
          return await response.json();
        } catch {
          return {};
        }
      };

      // AuthService exposes helpers that interact with the backend session endpoints.
      const AuthService = {
        async login(credentials) {
          const response = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(credentials),
          });
          const payload = await parseJson(response);
          return { response, payload };
        },
        async logout() {
          const response = await fetch(`${API_BASE}/auth/logout`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'content-type': 'application/json' },
          });
          const payload = await parseJson(response);
          return { response, payload };
        },
        async status() {
          const response = await fetch(`${API_BASE}/auth/status`, {
            credentials: 'include',
            headers: { 'content-type': 'application/json' },
          });
          const payload = await parseJson(response);
          return { response, payload };
        },
      };

      // Shared helper for JSON-based API requests that include session cookies.
      const fetchWithJson = async (path, options = {}) => {
        const response = await fetch(`${API_BASE}${path}`, {
          credentials: 'include',
          headers: { 'content-type': 'application/json', ...(options.headers ?? {}) },
          ...options,
        });
        const payload = await parseJson(response);
        return { response, payload };
      };

      // Presentational component that renders login inputs and enforces required fields.
      const LoginForm = ({ onSubmit, disabled }) => {
        const [username, setUsername] = useState('');
        const [password, setPassword] = useState('');
        const [error, setError] = useState('');

        const handleSubmit = (event) => {
          event.preventDefault();
          if (!username.trim() || !password.trim()) {
            setError('Username and password are required.');
            return;
          }
          setError('');
          onSubmit({ username: username.trim(), password: password.trim() });
        };

        return React.createElement(
          'form',
          { className: 'auth-form', onSubmit: handleSubmit },
          React.createElement(
            'div',
            { className: 'field-group' },
            React.createElement('label', { className: 'field-label', htmlFor: 'auth-username' }, 'Username'),
            React.createElement('input', {
              id: 'auth-username',
              className: 'field-input',
              placeholder: 'demo',
              value: username,
              onChange: (event) => setUsername(event.target.value),
              disabled,
            }),
          ),
          React.createElement(
            'div',
            { className: 'field-group' },
            React.createElement('label', { className: 'field-label', htmlFor: 'auth-password' }, 'Password'),
            React.createElement('input', {
              id: 'auth-password',
              type: 'password',
              className: 'field-input',
              placeholder: 'demo123',
              value: password,
              onChange: (event) => setPassword(event.target.value),
              disabled,
            }),
          ),
          error && React.createElement('p', { className: 'field-error', role: 'alert' }, error),
          React.createElement('button', { type: 'submit', className: 'primary', disabled }, 'Sign in'),
        );
      };

      // Shared component for creating or updating tasks while validating form inputs.
      const TaskForm = ({ defaultValues = DEFAULT_FORM, onSave, onCancel, disabled, submitLabel, resetOnSave }) => {
        const [title, setTitle] = useState(defaultValues.title);
        const [description, setDescription] = useState(defaultValues.description);
        const [error, setError] = useState('');

        useEffect(() => {
          setTitle(defaultValues.title);
          setDescription(defaultValues.description);
        }, [defaultValues]);

        const handleSubmit = (event) => {
          event.preventDefault();
          if (!title.trim()) {
            setError('Title is required.');
            return;
          }
          setError('');
          onSave({ title: title.trim(), description: description.trim() });
          if (resetOnSave) {
            setTitle('');
            setDescription('');
          }
        };

        return React.createElement(
          'form',
          { className: 'task-form', onSubmit: handleSubmit },
          React.createElement(
            'div',
            { className: 'field-group' },
            React.createElement('label', { className: 'field-label', htmlFor: 'todo-title' }, 'Title'),
            React.createElement('input', {
              id: 'todo-title',
              className: 'field-input',
              placeholder: 'E.g. Prepare sprint report',
              value: title,
              onChange: (event) => setTitle(event.target.value),
              disabled,
            }),
          ),
          React.createElement(
            'div',
            { className: 'field-group' },
            React.createElement('label', { className: 'field-label', htmlFor: 'todo-description' }, 'Description'),
            React.createElement('textarea', {
              id: 'todo-description',
              className: 'field-input',
              placeholder: 'Optional details to stay organized',
              value: description,
              onChange: (event) => setDescription(event.target.value),
              disabled,
              rows: 3,
            }),
          ),
          error && React.createElement('p', { className: 'field-error', role: 'alert' }, error),
          React.createElement(
            'div',
            { className: 'task-form-actions' },
            React.createElement('button', { type: 'submit', className: 'primary', disabled }, submitLabel || 'Save task'),
            onCancel &&
              React.createElement(
                'button',
                { type: 'button', className: 'secondary', onClick: onCancel, disabled },
                'Cancel',
              ),
          ),
        );
      };

      // Visual component that renders task cards and wires up completion, edit, and delete actions.
      const TodoList = ({ tasks, onToggle, onEdit, onDelete }) => {
        if (!tasks.length) {
          return React.createElement('p', { className: 'empty-state' }, "You don't have tasks yet. Use the form above to add your first item.");
        }

        return React.createElement(
          'div',
          { className: 'todo-list' },
          tasks.map((task) =>
            React.createElement(
              'article',
              { key: task.id, className: `todo-item ${task.completed ? 'completed' : ''}` },
              React.createElement(
                'div',
                { className: 'todo-main' },
                React.createElement(
                  'button',
                  {
                    type: 'button',
                    className: 'check-button',
                    'aria-pressed': task.completed,
                    'aria-label': task.completed ? `Mark ${task.title} incomplete` : `Mark ${task.title} complete`,
                    onClick: () => onToggle(task),
                  },
                  task.completed ? '✓' : '○',
                ),
                React.createElement('div', null,
                  React.createElement('h3', null, task.title),
                  task.description && React.createElement('p', null, task.description),
                ),
              ),
              React.createElement(
                'div',
                { className: 'todo-actions' },
                React.createElement('button', { type: 'button', onClick: () => onEdit(task) }, 'Edit'),
                React.createElement('button', { type: 'button', className: 'danger', onClick: () => onDelete(task) }, 'Delete'),
              ),
            ),
          ),
        );
      };

      // The root component that orchestrates service calls, authentication state, and UI sections.
      const App = () => {
        const [todos, setTodos] = useState([]);
        const [filter, setFilter] = useState('all');
        const [loading, setLoading] = useState(false);
        const [selectedTodo, setSelectedTodo] = useState(null);
        const [status, setStatus] = useState('');
        const [statusVariant, setStatusVariant] = useState('info');
        const [authState, setAuthState] = useState({ authenticated: false, user: null });
        const [authLoading, setAuthLoading] = useState(true);

        const filteredTodos = useMemo(() => {
          if (filter === 'active') {
            return todos.filter((item) => !item.completed);
          }
          if (filter === 'completed') {
            return todos.filter((item) => item.completed);
          }
          return todos;
        }, [filter, todos]);

        const showStatus = useCallback((message, variant = 'info') => {
          setStatus(message);
          setStatusVariant(variant);
        }, []);

        const fetchTodos = useCallback(async () => {
          setLoading(true);
          try {
            const { response, payload } = await fetchWithJson('/todos');
            if (response.status === 401) {
              setAuthState({ authenticated: false, user: null });
              showStatus('Please sign in to see your tasks.', 'error');
              return;
            }
            if (!response.ok) {
              showStatus('Unable to load tasks from the backend.', 'error');
              return;
            }
            setTodos(payload);
          } catch {
            showStatus('Unable to reach the backend. Please start the server.', 'error');
          } finally {
            setLoading(false);
          }
        }, [showStatus]);

        useEffect(() => {
          const checkSession = async () => {
            try {
              const { response, payload } = await AuthService.status();
              if (response.ok) {
                setAuthState({ authenticated: true, user: payload.user });
                showStatus(`Welcome back, ${payload.user?.display_name ?? payload.user?.username}!`, 'success');
              } else {
                setAuthState({ authenticated: false, user: null });
                showStatus('Sign in to unlock the todo workspace.', 'info');
              }
            } catch {
              showStatus('Unable to verify authentication.', 'error');
            } finally {
              setAuthLoading(false);
            }
          };

          void checkSession();
        }, [showStatus]);

        useEffect(() => {
          if (authState.authenticated) {
            void fetchTodos();
          } else {
            setTodos([]);
          }
        }, [authState.authenticated, fetchTodos]);

        const createTodo = useCallback(
          async (formPayload) => {
            setLoading(true);
            try {
              const { response, payload } = await fetchWithJson('/todos', {
                method: 'POST',
                body: JSON.stringify({
                  title: formPayload.title,
                  description: formPayload.description,
                }),
              });
              if (!response.ok) {
                showStatus('Unable to add the task.', 'error');
                return;
              }
              setTodos((prev) => [...prev, payload]);
              showStatus('Task added successfully.', 'success');
            } catch {
              showStatus('Unable to add the task.', 'error');
            } finally {
              setLoading(false);
            }
          },
          [showStatus],
        );

        const updateTodo = useCallback(
          async (formPayload) => {
            setLoading(true);
            try {
              const { response, payload } = await fetchWithJson(`/todos/${formPayload.id}`, {
                method: 'PUT',
                body: JSON.stringify(formPayload),
              });
              if (!response.ok) {
                showStatus('Unable to update the task.', 'error');
                return;
              }
              setTodos((prev) => prev.map((item) => (item.id === payload.id ? payload : item)));
              showStatus('Task updated successfully.', 'success');
            } catch {
              showStatus('Unable to update the task.', 'error');
            } finally {
              setLoading(false);
            }
          },
          [showStatus],
        );

        const handleLogin = useCallback(
          async (credentials) => {
            setAuthLoading(true);
            try {
              const { response, payload } = await AuthService.login(credentials);
              if (!response.ok) {
                showStatus(payload.message ?? 'Invalid credentials.', 'error');
                return;
              }
              setAuthState({ authenticated: true, user: payload.user });
              setSelectedTodo(null);
              showStatus(`Logged in as ${payload.user?.display_name ?? payload.user?.username}.`, 'success');
            } catch {
              showStatus('Unable to reach the authentication server.', 'error');
            } finally {
              setAuthLoading(false);
            }
          },
          [showStatus],
        );

        const handleLogout = useCallback(async () => {
          setAuthLoading(true);
          try {
            const { response } = await AuthService.logout();
            if (response.ok) {
              setAuthState({ authenticated: false, user: null });
              setTodos([]);
              setSelectedTodo(null);
              showStatus('You have been logged out.', 'info');
            } else {
              showStatus('Logout failed. Please try again.', 'error');
            }
          } catch {
            showStatus('Unable to reach the backend to log out.', 'error');
          } finally {
            setAuthLoading(false);
          }
        }, [showStatus]);

        const handleFormSave = useCallback(
          async (payload) => {
            if (selectedTodo) {
              await updateTodo({ id: selectedTodo.id, title: payload.title, description: payload.description });
              setSelectedTodo(null);
              return;
            }
            await createTodo(payload);
          },
          [selectedTodo, createTodo, updateTodo],
        );

        const handleToggle = useCallback(
          async (task) => {
            await updateTodo({ id: task.id, completed: !task.completed });
          },
          [updateTodo],
        );

        const handleDelete = useCallback(
          async (task) => {
            setLoading(true);
            try {
              const { response } = await fetchWithJson(`/todos/${task.id}`, { method: 'DELETE' });
              if (!response.ok) {
                showStatus('Unable to delete the task.', 'error');
                return;
              }
              setTodos((prev) => prev.filter((item) => item.id !== task.id));
              showStatus('Task removed successfully.', 'success');
            } catch {
              showStatus('Unable to delete the task.', 'error');
            } finally {
              setLoading(false);
            }
          },
          [showStatus],
        );

        const activeCount = useMemo(() => todos.filter((item) => !item.completed).length, [todos]);
        const completedCount = todos.length - activeCount;

        return React.createElement(
          'div',
          { className: 'app-card-content' },
          React.createElement(
            'header',
            { className: 'app-header' },
            React.createElement('p', { className: 'eyebrow' }, 'React + Flask stack'),
            React.createElement('h1', null, 'Todo List'),
            React.createElement('p', { className: 'lead' }, 'Manage tasks with an expressive React UI and a lightweight Python backend.'),
          ),
          React.createElement(
            'section',
            { className: 'auth-section' },
            React.createElement(
              'div',
              { className: 'auth-panel' },
              React.createElement(
                'div',
                { className: 'auth-heading' },
                React.createElement('p', { className: 'eyebrow' }, 'Authentication'),
                React.createElement('h2', null, 'Sign in to unlock your workspace'),
              ),
              authState.authenticated
                ? React.createElement(
                    'div',
                    { className: 'auth-row' },
                    React.createElement('p', { className: 'lead' }, `Signed in as ${authState.user?.display_name ?? authState.user?.username}`),
                    React.createElement('button', { type: 'button', className: 'secondary', onClick: handleLogout, disabled: authLoading }, 'Sign out'),
                  )
                : React.createElement(
                    React.Fragment,
                    null,
                    React.createElement('p', { className: 'auth-note' }, 'Use demo/demo123 or tester/tester123 to sign in.'),
                    React.createElement(LoginForm, { onSubmit: handleLogin, disabled: authLoading }),
                  ),
              authState.authenticated && React.createElement('p', { className: 'auth-note' }, 'You now have access to the todo workspace.'),
            ),
          ),
          authState.authenticated
            ? React.createElement(
                'section',
                { className: 'task-wrapper' },
                React.createElement(TaskForm, {
                  defaultValues: selectedTodo || DEFAULT_FORM,
                  onSave: handleFormSave,
                  onCancel: selectedTodo
                    ? () => {
                        setSelectedTodo(null);
                        showStatus('Edit canceled.', 'info');
                      }
                    : undefined,
                  disabled: loading,
                  submitLabel: selectedTodo ? 'Save changes' : 'Add task',
                  resetOnSave: !selectedTodo,
                }),
                React.createElement(
                  'section',
                  { className: 'task-summary' },
                  React.createElement(
                    'div',
                    null,
                    React.createElement('p', { className: 'summary-label' }, 'Active tasks'),
                    React.createElement('p', { className: 'summary-value' }, activeCount),
                  ),
                  React.createElement(
                    'div',
                    null,
